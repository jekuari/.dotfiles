# Set default cursor to a vertical bar (steady/blinking depending on terminal)
# terminal-features is the modern replacement for terminal-overrides in tmux 3.2+
# We target xterm* because most modern terminals (Ghostty, Alacritty, Kitty) 
# identify as xterm-256color or similar, or tmux translates it.
set -as terminal-features ",xterm*:RGB"
set -as terminal-features ",xterm*:extkeys"

# Keep the cursor as a bar when resetting. 
# We explicitly target xterm-256color and the generic * to be safe.
set -ag terminal-overrides ",xterm-256color:Ss=\e[%p1%d q:Se=\e[5 q"
set -ag terminal-overrides ",*:Ss=\e[%p1%d q:Se=\e[5 q"

set-option -g default-shell /bin/zsh
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin "arcticicestudio/nord-tmux"

vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

set -gq allow-passthrough on

set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g visual-activity off


bind h split-window -v -c '#{pane_current_path}'
bind v split-window -h -c '#{pane_current_path}'
bind b split-window -v -l 25% -c '#{pane_current_path}'

bind -n C-s display-popup -E "zsh -c '/Users/rferegrino/repos/.dotfiles/tmux-sessionizer/tmux-sessionizer.sh'"
bind C-t display-popup

bind r source-file ~/.config/tmux/tmux.conf


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
